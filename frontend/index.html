  <script>
    (function () {
      try {
        var lang = navigator.language || '';
        if (lang.indexOf('@') !== -1) {
          var cleaned = lang.split('@')[0] || 'en-US';
          Object.defineProperty(navigator, 'language',  { get: function () { return cleaned; }, configurable: true });
          Object.defineProperty(navigator, 'languages', { get: function () { return [cleaned, 'en']; }, configurable: true });
        }
      } catch (_) {}
    })();
    // Self-uninstall any lingering service worker + purge caches so old
    // bundles cannot come back on a hard refresh.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      });
      if (window.caches && caches.keys) {
        caches.keys().then(function (ks) { ks.forEach(function (k) { caches.delete(k); }); });
      }
    }
  </script>
