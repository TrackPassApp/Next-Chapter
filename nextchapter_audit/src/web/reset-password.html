<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reset Password | Next Chapter</title>
  <style>
    :root{color-scheme:dark;--bg:#0a0e14;--card:#151b24;--gold:#d8ad63;--text:#f5f1e8;--muted:#aab2bf;--danger:#ff8a8a}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#202836 0,var(--bg) 55%);font-family:system-ui,-apple-system,Segoe UI,sans-serif;color:var(--text);display:grid;place-items:center;padding:20px}
    main{width:min(460px,100%);background:var(--card);border:1px solid #354052;border-radius:18px;padding:30px;box-shadow:0 20px 60px #0008}
    h1{margin:0 0 8px;color:var(--gold);font-size:28px}p{color:var(--muted);line-height:1.5}label{display:block;margin:18px 0 7px;font-weight:650}
    input{width:100%;padding:13px 14px;border-radius:10px;border:1px solid #4c586a;background:#0f141c;color:var(--text);font-size:16px}
    button,a.button{width:100%;display:block;margin-top:20px;padding:13px;border:0;border-radius:10px;background:var(--gold);color:#17120a;font-weight:800;font-size:16px;text-align:center;text-decoration:none;cursor:pointer}
    button:disabled{opacity:.55;cursor:wait}.status{min-height:24px;margin-top:16px}.error{color:var(--danger)}.success{color:#8ee6ac}.hidden{display:none}
  </style>
</head>
<body>
<main>
  <h1>Choose a new password</h1>
  <p>Enter a new password for your Next Chapter account.</p>
  <form id="form" class="hidden">
    <label for="password">New password</label>
    <input id="password" type="password" minlength="8" autocomplete="new-password" required>
    <label for="confirm">Confirm new password</label>
    <input id="confirm" type="password" minlength="8" autocomplete="new-password" required>
    <button id="submit" type="submit">Update password</button>
  </form>
  <div id="status" class="status">Checking your secure reset link…</div>
  <a id="return" class="button hidden" href="https://joinmynextchapter.com/login">Return to Next Chapter</a>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const client=window.supabase.createClient(
  'https://qlpxlrpbrzxwdyzpwaxz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFscHhscnBicnp4d2R5enB3YXh6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4OTkxMTMsImV4cCI6MjA5NzQ3NTExM30.qm0A9G2Fu6mETunBBbFd0RBA5ZUjQ4O3NzzcZJqw53E',
  {auth:{detectSessionInUrl:true,persistSession:true}}
);
const form=document.getElementById('form'),statusEl=document.getElementById('status'),returnEl=document.getElementById('return'),submit=document.getElementById('submit');
function message(text,type=''){statusEl.textContent=text;statusEl.className='status '+type}
async function initialize(){
  try{
    const params=new URLSearchParams(location.search),tokenHash=params.get('token_hash'),code=params.get('code');
    if(tokenHash){const {error}=await client.auth.verifyOtp({token_hash:tokenHash,type:'recovery'});if(error)throw error}
    if(code){const {error}=await client.auth.exchangeCodeForSession(code);if(error)throw error}
    const {data,error}=await client.auth.getSession();if(error)throw error;
    if(!data.session)throw new Error('This reset link is invalid or has expired. Please request a new password-reset email.');
    history.replaceState({},document.title,'/reset-password.html');form.classList.remove('hidden');message('Secure link confirmed.');
  }catch(e){message(e.message||'The reset link could not be verified.','error');returnEl.classList.remove('hidden')}
}
form.addEventListener('submit',async e=>{
  e.preventDefault();const password=document.getElementById('password').value,confirm=document.getElementById('confirm').value;
  if(password.length<8){message('Your password must contain at least 8 characters.','error');return}
  if(password!==confirm){message('The passwords do not match.','error');return}
  submit.disabled=true;message('Updating your password…');const {error}=await client.auth.updateUser({password});
  if(error){submit.disabled=false;message(error.message,'error');return}
  await client.auth.signOut();form.classList.add('hidden');message('Your password was updated successfully.','success');returnEl.classList.remove('hidden');
});
initialize();
</script>
</body>
</html>
